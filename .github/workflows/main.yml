name: Restart Kaggle Strike
on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install Kaggle API
        run: pip install kaggle

      - name: Inject Secrets and Push
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          # 1. Create the EXACT directory the error is looking for
          mkdir -p /home/runner/.config/kaggle
          
          # 2. Place the token in the access_token file
          echo "$KAGGLE_API_TOKEN" > /home/runner/.config/kaggle/access_token
          chmod 600 /home/runner/.config/kaggle/access_token
          
          # 3. Swap the placeholders in your script
          sed -i "s|REPLACE_COOKIE|${{ secrets.INSTA_COOKIE }}|g" prvr_script.py
          sed -i "s|REPLACE_THREAD|${{ secrets.THREAD_ID }}|g" prvr_script.py
          sed -i "s|REPLACE_NAME|${{ secrets.TARGET_NAME }}|g" prvr_script.py
          
          # 4. Push to Kaggle
          kaggle kernels push -p .
