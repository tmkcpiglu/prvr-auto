name: Restart Kaggle Strike
on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install Kaggle API
        run: pip install kaggle

      - name: Inject Secrets and Push
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          # 1. Create the legacy directory and file for auth
          mkdir -p ~/.kaggle
          echo "{\"username\":\"praveermandal\",\"key\":\"$KAGGLE_API_TOKEN\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          # 2. Swap placeholders in your prvr_script.py
          sed -i "s|REPLACE_COOKIE|${{ secrets.INSTA_COOKIE }}|g" prvr_script.py
          sed -i "s|REPLACE_THREAD|${{ secrets.THREAD_ID }}|g" prvr_script.py
          sed -i "s|REPLACE_NAME|${{ secrets.TARGET_NAME }}|g" prvr_script.py
          
          # 3. Push to Kaggle
          kaggle kernels push -p .
