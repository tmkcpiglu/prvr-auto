name: Restart Kaggle Strike
on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install Kaggle API
        run: pip install kaggle

      - name: Inject Secrets and Push
        env:
          # This line tells the Kaggle CLI to use your token directly
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          # 1. Swap the placeholders in your script with your actual secrets
          sed -i "s|REPLACE_COOKIE|${{ secrets.INSTA_COOKIE }}|g" prvr_script.py
          sed -i "s|REPLACE_THREAD|${{ secrets.THREAD_ID }}|g" prvr_script.py
          sed -i "s|REPLACE_NAME|${{ secrets.TARGET_NAME }}|g" prvr_script.py
          
          # 2. Push the kernel to Kaggle using the token in the environment
          kaggle kernels push -p .
